version: '3.8'

services:
  # -------------------------------------------------------------------
  # 1. Rust Arbitrage Execution Engine (Core Worker)
  # -------------------------------------------------------------------
  engine-worker:
    build:
      context: ./engine-worker
      dockerfile: Dockerfile
    container_name: arbitrasaas_engine
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - KMS_MASTER_KEY=${KMS_MASTER_KEY}
      - ENGINE_API_SECRET=${ENGINE_API_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - BITGET_API_KEY=${BITGET_API_KEY:-}
      - BITGET_API_SECRET=${BITGET_API_SECRET:-}
      - BITGET_PASSPHRASE=${BITGET_PASSPHRASE:-}
    volumes:
      - shared_telemetry:/app/telemetry

  # -------------------------------------------------------------------
  # 2. Next.js SaaS Web Dashboard & API
  # -------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arbitrasaas_web
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - engine-worker
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_NETWORK=${NEXT_PUBLIC_NETWORK:-devnet}
      - DATABASE_URL=${DATABASE_URL}
      - ENGINE_API_SECRET=${ENGINE_API_SECRET}
      - NEXTJS_API_URL=http://engine-worker:3002
    volumes:
      - shared_telemetry:/app/engine-worker

volumes:
  shared_telemetry:
